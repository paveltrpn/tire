<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Global Coordinate System - Perfectly Perpendicular Axes -->
  
  <!-- Center Pivot Point -->
  <circle cx="20" cy="20" r="2.5" fill="white" stroke="white" stroke-width="1" />

  <!-- X Axis (Right) -->
  <line x1="20" y1="20" x2="36" y2="20" stroke="white" stroke-width="2" stroke-linecap="round" />
  <path d="M33 17L36 20L33 23" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Y Axis (Up) -->
  <line x1="20" y1="20" x2="20" y2="4" stroke="white" stroke-width="2" stroke-linecap="round" />
  <path d="M17 7L20 4L23 7" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Z Axis (Diagonal Up-Right - representing 3D depth) -->
  <line x1="20" y1="20" x2="32" y2="8" stroke="white" stroke-width="2" stroke-linecap="round" />
  <!-- Z Arrowhead -->
  <path d="M29.5 9.5L32 8L30 5.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Optional: A faint square border to imply the "World Boundary" -->
  <rect x="2" y="2" width="36" height="36" stroke="white" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="4 4" />
</svg>
