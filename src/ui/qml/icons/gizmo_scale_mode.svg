<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Scale Gizmo - 40x40 pixels - White on Transparent -->
  
  <!-- The Base Object (Rectangle) -->
  <rect x="10" y="10" width="16" height="16" stroke="white" stroke-width="2" stroke-linejoin="round" />

  <!-- The Interactive Handle (Circular Widget in the corner) -->
  <circle cx="26" cy="26" r="4.5" stroke="white" stroke-width="2" fill="white" />

  <!-- Scaling Indicators (Arrows pointing outward) -->
  <!-- Diagonal Arrow (Main Scaling Direction) -->
  <path d="M25.5 21.5L29 25L25.5 28.5" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Horizontal Indicator (Optional for clarity) -->
  <path d="M26 16V18" stroke="white" stroke-width="2.5" stroke-linecap="round" />
  
  <!-- Vertical Indicator (Optional for clarity) -->
  <path d="M16 26H18" stroke="white" stroke-width="2.5" stroke-linecap="round" />
  
  <!-- Corner connector line (Optional visual link between handle and object) -->
  <path d="M22 22L24.5 24.5" stroke="white" stroke-width="1" stroke-opacity="0.6" />
</svg>
